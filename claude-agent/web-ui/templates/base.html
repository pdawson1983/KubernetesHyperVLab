<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AgentForge{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3e;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --accent:    #818cf8;
      --success:   #22c55e;
      --warning:   #f59e0b;
      --error:     #ef4444;
      --info:      #38bdf8;
      --purple:    #a78bfa;
    }

    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif;
           font-size: 14px; line-height: 1.5; min-height: 100vh; }

    /* Nav */
    nav { background: var(--surface); border-bottom: 1px solid var(--border);
          padding: 0 24px; display: flex; align-items: center; height: 52px; gap: 32px; }
    .brand { font-weight: 700; font-size: 16px; color: var(--accent);
             text-decoration: none; letter-spacing: -0.3px; }
    .brand span { color: var(--purple); }
    nav a { color: var(--muted); text-decoration: none; font-size: 13px; }
    nav a:hover, nav a.active { color: var(--text); }

    /* Layout */
    main { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 20px; }
    h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

    /* Cards */
    .card { background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; padding: 16px 20px; margin-bottom: 12px; }
    .card:hover { border-color: #3a3d50; }

    /* Status badges */
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 2px 8px;
             border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase;
             letter-spacing: 0.4px; }
    .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .badge.completed  { color: var(--success); background: #052e16; }
    .badge.failed     { color: var(--error);   background: #2d0707; }
    .badge.running    { color: var(--warning);  background: #2d1f02; }
    .badge.awaiting_approval { color: var(--info); background: #052030; }
    .badge.skipped  { color: var(--muted); background: #1a1d27; border: 1px solid var(--border); }
    .badge.success    { color: var(--success); background: #052e16; }
    .badge.error      { color: var(--error);   background: #2d0707; }

    /* Table */
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; color: var(--muted); font-size: 11px; text-transform: uppercase;
         letter-spacing: 0.5px; padding: 8px 12px; border-bottom: 1px solid var(--border); }
    td { padding: 10px 12px; border-bottom: 1px solid #1e2130; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1e2130; }
    td a { color: var(--accent); text-decoration: none; }
    td a:hover { text-decoration: underline; }

    /* Chain */
    .chain { display: flex; gap: 4px; flex-wrap: wrap; }
    .chain-step { padding: 2px 6px; border-radius: 4px; font-size: 10px;
                  font-weight: 600; text-transform: uppercase; }
    .chain-step.success  { background: #052e16; color: var(--success); }
    .chain-step.failed   { background: #2d0707; color: var(--error); }
    .chain-step.running  { background: #2d1f02; color: var(--warning); }
    .chain-step.skipped  { background: #1a1d27; color: var(--muted); border: 1px solid var(--border); }

    /* Forms */
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
    input, select, textarea {
      width: 100%; background: #0d1018; border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 8px 12px; font-size: 13px;
      font-family: inherit; outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px;
           border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer;
           border: none; transition: opacity .15s; }
    .btn:hover { opacity: .85; }
    .btn-primary { background: var(--accent); color: #0f1117; }
    .btn-success { background: var(--success); color: #0f1117; }
    .btn-sm { padding: 4px 10px; font-size: 11px; }

    /* Alerts */
    .alert { padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
    .alert-error { background: #2d0707; border: 1px solid #7f1d1d; color: #fca5a5; }

    /* Misc */
    .mono { font-family: 'Courier New', monospace; font-size: 12px; color: var(--muted); }
    .meta { font-size: 12px; color: var(--muted); }
    .repo-link { color: var(--purple); font-size: 12px; }
  </style>
  {% block head_extra %}{% endblock %}
</head>
<body>
  <nav>
    <a href="/" class="brand">Agent<span>Forge</span></a>
    <a href="/" {% if request.url.path == '/' %}class="active"{% endif %}>Dashboard</a>
    <a href="/submit" {% if request.url.path == '/submit' %}class="active"{% endif %}>Submit</a>
    <a href="/approvals" {% if request.url.path == '/approvals' %}class="active"{% endif %}>Approvals</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
