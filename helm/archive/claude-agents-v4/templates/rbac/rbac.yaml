{{- if .Values.rbac.enabled }}
# =============================================================================
# RBAC
# Agents need permission to create Jobs (to spawn sub-tasks) and read/write
# ConfigMaps (to pass signals between agents).
# =============================================================================

# Service account — every agent pod runs as this identity
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.rbac.serviceAccountName }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "claude-agents.labels" . | nindent 4 }}

---
# Role — what the service account is allowed to do
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "claude-agents.fullname" . }}-agent-role
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "claude-agents.labels" . | nindent 4 }}
rules:
  # Agents can create and monitor Jobs (to run sub-tasks)
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]

  # Agents can read ConfigMaps (for instructions and project context)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]

  # Agents can read their own pod info (for logging context)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

  # Agents can read pod logs
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]

---
# RoleBinding — attach the role to the service account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "claude-agents.fullname" . }}-agent-rolebinding
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "claude-agents.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.rbac.serviceAccountName }}
    namespace: {{ .Values.global.namespace }}
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: {{ include "claude-agents.fullname" . }}-agent-role
{{- end }}
