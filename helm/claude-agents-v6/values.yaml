# =============================================================================
# claude-agents/values.yaml
# =============================================================================

# ---------------------------------------------------------------------------
# Global settings
# ---------------------------------------------------------------------------
fullnameOverride: agentforge

global:
  namespace: agentforge
  apiKeySecret: anthropic-api-key
  # Set enabled: true and create the secret with your ~/.claude/.credentials.json
  # to use a Claude.ai Max subscription instead of a raw API key.
  # kubectl create secret generic claude-credentials \
  #   --from-file=.credentials.json=$HOME/.claude/.credentials.json \
  #   -n claude-agents
  claudeCredentials:
    enabled: true
    secretName: claude-credentials
  # mockMode: skip Claude invocation entirely; agents write fixture files and
  # chain normally. Zero token cost — tests infrastructure only.
  # Enable via: helm upgrade ... --set global.mockMode=true
  mockMode: false
  # maxTurns: global override — set to N to cap all agents (e.g. for testing).
  # 0 = use per-agent values defined under agents.<role>.maxTurns below.
  maxTurns: 0
  image:
    # Push: podman push 192.168.100.11:30500/claude-agent:<tag> --tls-verify=false
    repository: 192.168.100.11:30500/claude-agent
    tag: "20260510-212544"
    pullPolicy: IfNotPresent
  model: claude-sonnet-4-20250514
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# ---------------------------------------------------------------------------
# Persistent memory volume — shared across all agents via NFS (ReadWriteMany)
# ---------------------------------------------------------------------------
memory:
  enabled: true
  size: 10Gi
  storageClass: "nfs"
  accessMode: ReadWriteMany
  mountPath: /memory

# ---------------------------------------------------------------------------
# Webhook receiver
# ---------------------------------------------------------------------------
webhook:
  enabled: true
  port: 8080
  # ClusterIP — ingress handles external access
  serviceType: ClusterIP
  nodePort: 30080
  secretName: webhook-secret
  replicas: 1
  # approvalRequired: pause pipeline at reviewer→ops; user approves via web UI
  approvalRequired: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ---------------------------------------------------------------------------
# Agent definitions
# ---------------------------------------------------------------------------
agents:

  architect:
    enabled: true
    triggers:
      - "issue.opened"
      - "issue.labeled"
    maxTokens: 4096
    maxTurns: 20
    timeout: 300

  coder:
    enabled: true
    triggers:
      - "architect.complete"
    maxTokens: 8192
    maxTurns: 50
    timeout: 600

  reviewer:
    enabled: true
    triggers:
      - "pr.opened"
      - "pr.synchronize"
      - "tester.complete"
    maxTokens: 4096
    maxTurns: 25
    timeout: 300

  tester:
    enabled: true
    triggers:
      - "coder.complete"
    maxTokens: 4096
    maxTurns: 40
    timeout: 600

  ops:
    enabled: true
    triggers:
      - "reviewer.approved"
      - "deployment.requested"
    maxTokens: 2048
    maxTurns: 30
    timeout: 600

# ---------------------------------------------------------------------------
# RBAC
# ---------------------------------------------------------------------------
rbac:
  enabled: true
  serviceAccountName: agentforge

# ---------------------------------------------------------------------------
# In-cluster container registry
# Uses NodePort for both push (from WSL) and pull (from nodes).
# No ingress — avoids TLS complexity for registry operations.
#
# Push from WSL:
#   podman push 192.168.100.11:30500/claude-agent:latest --tls-verify=false
#
# Nodes pull from:
#   192.168.100.11:30500/claude-agent:latest
#
# containerd trust config (run once per node):
#   mkdir -p /etc/containerd/certs.d/192.168.100.11:30500
#   cat > /etc/containerd/certs.d/192.168.100.11:30500/hosts.toml << EOF
#   server = "http://192.168.100.11:30500"
#   [host."http://192.168.100.11:30500"]
#     capabilities = ["pull", "resolve", "push"]
#     skip_verify = true
#   EOF
#   systemctl restart containerd
# ---------------------------------------------------------------------------
registry:
  enabled: true
  image:
    tag: "2"
    pullPolicy: IfNotPresent
  # NodePort — used for both push from WSL and pull from nodes
  serviceType: NodePort
  nodePort: 30500
  logLevel: info
  storage:
    size: 20Gi
    storageClass: "local-path"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  auth:
    enabled: false
    secretName: registry-auth
  tls:
    enabled: true
    secretName: registry-tls

# ---------------------------------------------------------------------------
# Ingress — webhook only
# Registry does NOT go through ingress (avoids TLS cert issues with containerd)
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  domain: k8s.local
  className: nginx
  annotations: {}
  # Webhook ingress — enabled
  webhook:
    enabled: true
  # Registry ingress — disabled, uses NodePort directly
  registry:
    enabled: false
  tls:
    enabled: false
    secretName: k8s-local-tls

# ---------------------------------------------------------------------------
# MCP (Model Context Protocol) servers
# In-cluster MCP servers that agents connect to at runtime via SSE.
# Each enabled server's URL is injected as MCP_<NAME>_URL into agent pods.
# The architect controls per-agent access by listing server names in the
# mcpServers array of each queue file. entrypoint.sh builds
# ~/.claude/settings.json from that list before invoking Claude Code.
# See ADR-011.
# ---------------------------------------------------------------------------
mcp:
  enabled: true
  servers:
    github:
      # Secret created 2026-05-09. Recreate with:
      #   kubectl create secret generic github-token \
      #     --from-literal=GITHUB_TOKEN="$(cat ~/.config/agentforge/github-token)" -n claude-agents
      enabled: true
      image:
        repository: ghcr.io/github/github-mcp-server
        tag: latest
        pullPolicy: IfNotPresent
      port: 8080
      tokenSecret: github-token
      # HTTP transport — subcommand is "http", not --transport flag
      args:
        - "http"
        - "--port"
        - "8080"
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi

# ---------------------------------------------------------------------------
# Web UI — FastAPI dashboard (task list, submit, task detail, approvals)
# Ingress: dashboard.k8s.local
# Add to /etc/hosts: 192.168.100.200 dashboard.k8s.local
# ---------------------------------------------------------------------------
webui:
  enabled: true
  image:
    repository: 192.168.100.11:30500/agentforge-webui
    tag: "latest"
    pullPolicy: Always
  port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ---------------------------------------------------------------------------
# Postgres — observability DB + web UI backend
# Stores structured per-run data (pipeline_runs + agent_runs tables).
# Requires the postgres-credentials secret before enabling:
#   kubectl create secret generic postgres-credentials \
#     --from-literal=POSTGRES_DB=agentforge \
#     --from-literal=POSTGRES_USER=agentforge \
#     --from-literal=POSTGRES_PASSWORD=changeme \
#     -n claude-agents
# ---------------------------------------------------------------------------
postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  port: 5432
  credentialsSecret: postgres-credentials
  storage:
    size: 5Gi
    storageClass: "local-path"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ---------------------------------------------------------------------------
# Network policy
# ---------------------------------------------------------------------------
networkPolicy:
  enabled: false
