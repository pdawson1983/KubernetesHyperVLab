# =============================================================================
# claude-agents/values.yaml
# =============================================================================

# ---------------------------------------------------------------------------
# Global settings
# ---------------------------------------------------------------------------
global:
  namespace: claude-agents
  apiKeySecret: anthropic-api-key
  # Set enabled: true and create the secret with your ~/.claude/.credentials.json
  # to use a Claude.ai Max subscription instead of a raw API key.
  # kubectl create secret generic claude-credentials \
  #   --from-file=.credentials.json=$HOME/.claude/.credentials.json \
  #   -n claude-agents
  claudeCredentials:
    enabled: true
    secretName: claude-credentials
  # mockMode: skip Claude invocation entirely; agents write fixture files and
  # chain normally. Zero token cost — tests infrastructure only.
  # Enable via: helm upgrade ... --set global.mockMode=true
  mockMode: false
  # maxTurns: maximum agentic turns per Claude invocation. Override for testing:
  # helm upgrade ... --set global.maxTurns=3 --set global.model=claude-haiku-4-5-20251001
  maxTurns: 10
  image:
    # After pushing: podman push 192.168.100.11:30500/claude-agent:latest --tls-verify=false
    repository: docker.io/pdawson1983/claude-agent
    tag: "20260508-023415"
    pullPolicy: IfNotPresent
  model: claude-sonnet-4-20250514
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# ---------------------------------------------------------------------------
# Persistent memory volume — shared across all agents via NFS (ReadWriteMany)
# ---------------------------------------------------------------------------
memory:
  enabled: true
  size: 10Gi
  storageClass: "nfs"
  accessMode: ReadWriteMany
  mountPath: /memory

# ---------------------------------------------------------------------------
# Webhook receiver
# ---------------------------------------------------------------------------
webhook:
  enabled: true
  port: 8080
  # ClusterIP — ingress handles external access
  serviceType: ClusterIP
  nodePort: 30080
  secretName: webhook-secret
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# ---------------------------------------------------------------------------
# Agent definitions
# ---------------------------------------------------------------------------
agents:

  architect:
    enabled: true
    triggers:
      - "issue.opened"
      - "issue.labeled"
    maxTokens: 4096
    timeout: 300

  coder:
    enabled: true
    triggers:
      - "architect.complete"
    maxTokens: 8192
    timeout: 600

  reviewer:
    enabled: true
    triggers:
      - "pr.opened"
      - "pr.synchronize"
      - "tester.complete"
    maxTokens: 4096
    timeout: 300

  tester:
    enabled: true
    triggers:
      - "coder.complete"
    maxTokens: 4096
    timeout: 300

  ops:
    enabled: true
    triggers:
      - "reviewer.approved"
      - "deployment.requested"
    maxTokens: 2048
    timeout: 600

# ---------------------------------------------------------------------------
# RBAC
# ---------------------------------------------------------------------------
rbac:
  enabled: true
  serviceAccountName: claude-agent

# ---------------------------------------------------------------------------
# In-cluster container registry
# Uses NodePort for both push (from WSL) and pull (from nodes).
# No ingress — avoids TLS complexity for registry operations.
#
# Push from WSL:
#   podman push 192.168.100.11:30500/claude-agent:latest --tls-verify=false
#
# Nodes pull from:
#   192.168.100.11:30500/claude-agent:latest
#
# containerd trust config (run once per node):
#   mkdir -p /etc/containerd/certs.d/192.168.100.11:30500
#   cat > /etc/containerd/certs.d/192.168.100.11:30500/hosts.toml << EOF
#   server = "http://192.168.100.11:30500"
#   [host."http://192.168.100.11:30500"]
#     capabilities = ["pull", "resolve", "push"]
#     skip_verify = true
#   EOF
#   systemctl restart containerd
# ---------------------------------------------------------------------------
registry:
  enabled: true
  image:
    tag: "2"
    pullPolicy: IfNotPresent
  # NodePort — used for both push from WSL and pull from nodes
  serviceType: NodePort
  nodePort: 30500
  logLevel: info
  storage:
    size: 20Gi
    storageClass: "local-path"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  auth:
    enabled: false
    secretName: registry-auth

# ---------------------------------------------------------------------------
# Ingress — webhook only
# Registry does NOT go through ingress (avoids TLS cert issues with containerd)
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  domain: k8s.local
  className: nginx
  annotations: {}
  # Webhook ingress — enabled
  webhook:
    enabled: true
  # Registry ingress — disabled, uses NodePort directly
  registry:
    enabled: false
  tls:
    enabled: false
    secretName: k8s-local-tls

# ---------------------------------------------------------------------------
# Network policy
# ---------------------------------------------------------------------------
networkPolicy:
  enabled: false
