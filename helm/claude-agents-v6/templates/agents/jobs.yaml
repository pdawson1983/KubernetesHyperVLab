# =============================================================================
# Agent CronJobs (suspended)
# These are NOT meant to run on a schedule. They are suspended CronJobs used
# purely as pod spec templates. The webhook dispatcher creates Jobs from them
# on demand using:
#   kubectl create job <name> --from cronjob/<template-name> -n <namespace>
#
# Why CronJob instead of Job?
#   - Jobs are run-once. Once completed/failed they can't be used as templates.
#   - CronJobs with suspend:true hold the pod spec permanently and can be used
#     as a template source unlimited times via --from cronjob/
#   - This lets the dispatcher spin up the same agent type multiple times
#     without Helm managing individual job instances.
# =============================================================================

{{- if .Values.agents.architect.enabled }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "claude-agents.fullname" . }}-architect
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "claude-agents.agentLabels" (dict "agent" "architect" "root" .) | nindent 4 }}
  annotations:
    claude-agents/triggers: {{ .Values.agents.architect.triggers | join "," | quote }}
    agentforge/type: "template"
spec:
  schedule: "0 0 31 2 *"   # Feb 31 — never runs naturally
  suspend: true              # explicitly suspended as a safety net
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      backoffLimit: 0
      template:
        metadata:
          labels:
            {{- include "claude-agents.agentLabels" (dict "agent" "architect" "root" .) | nindent 12 }}
        spec:
          serviceAccountName: {{ .Values.rbac.serviceAccountName }}
          restartPolicy: Never
          {{- include "claude-agents.agentSecurityContext" . | nindent 10 }}
          initContainers:
            - name: setup-memory
              image: busybox:1.36
              command:
                - sh
                - -c
                - mkdir -p /memory/tasks
              volumeMounts:
                - name: agent-memory
                  mountPath: /memory
          containers:
            - name: architect
              image: {{ include "claude-agents.agentImage" (dict "name" "claude-agent" "root" .) }}
              imagePullPolicy: {{ .Values.global.image.pullPolicy }}
              env:
                {{- include "claude-agents.agentEnv" . | nindent 16 }}
                {{- include "claude-agents.mcpEnv" . | nindent 16 }}
                - name: AGENT_MAX_TURNS
                  value: {{ if .Values.global.maxTurns }}{{ .Values.global.maxTurns | quote }}{{ else }}{{ .Values.agents.architect.maxTurns | quote }}{{ end }}
                - name: AGENT_TIMEOUT
                  value: {{ .Values.agents.architect.timeout | quote }}
                - name: MAX_TOKENS
                  value: {{ .Values.agents.architect.maxTokens | quote }}
              volumeMounts:
                {{- include "claude-agents.agentVolumeMounts" . | nindent 16 }}
              {{- include "claude-agents.resources" . | nindent 14 }}
          volumes:
            {{- include "claude-agents.agentVolumes" (dict "agent" "architect" "root" .) | nindent 12 }}
{{- end }}

{{- if .Values.agents.coder.enabled }}
---
