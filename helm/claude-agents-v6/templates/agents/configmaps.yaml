# =============================================================================
# Agent ConfigMaps
# Each agent gets its own ConfigMap containing its CLAUDE.md instructions.
# These are mounted at /etc/agent/CLAUDE.md inside each agent container.
# Agents read this at startup to understand their role and rules.
# =============================================================================

{{- if .Values.agents.architect.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "claude-agents.fullname" . }}-architect-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "claude-agents.agentLabels" (dict "agent" "architect" "root" .) | nindent 4 }}
data:
  CLAUDE.md: |
    {{- .Values.agents.architect.instructions | nindent 4 }}
  config.json: |
    {
      "role": "architect",
      "maxTokens": {{ .Values.agents.architect.maxTokens }},
      "triggers": {{ .Values.agents.architect.triggers | toJson }},
      "timeout": {{ .Values.agents.architect.timeout }}
    }
{{- end }}

