# =============================================================================
# Agent ConfigMaps — removed
#
# Per-role CLAUDE.md instructions and config.json were previously injected
# here as ConfigMaps mounted at /etc/agent/. This pattern was removed because:
#
#   1. Role restrictions baked into Helm config prevent agents from adapting
#      to the conventions of the projects they are building.
#   2. config.json was redundant — role, timeout, and maxTokens are already
#      available as env vars (AGENT_ROLE, AGENT_TIMEOUT, MAX_TOKENS).
#   3. The orchestration layer should not govern agent behaviour. That
#      responsibility belongs to the project being built (workspace CLAUDE.md)
#      and the base image instructions (/agent/CLAUDE.md).
#
# What governs agent behaviour now:
#   /agent/CLAUDE.md              — baked into image; general pipeline rules,
#                                   memory layout, role descriptions, security
#   /memory/CLAUDE.md             — written by architect or user per-task;
#                                   included in prompt if present
#   /memory/workspace/<proj>/CLAUDE.md — project conventions; read automatically
#                                        by Claude Code when navigating there
# =============================================================================
