{{- if .Values.registry.enabled }}
# =============================================================================
# In-Cluster Container Registry
# Uses NodePort + TLS (self-signed cert) for push (WSL) and pull (nodes).
# TLS required for containerd 2.x CRI image pull path.
#
# Push from WSL:
#   podman push 192.168.100.11:30500/claude-agent:<tag> --tls-verify=false
#
# containerd trust (run once per node — hosts.toml uses skip_verify):
#   mkdir -p /etc/containerd/certs.d/192.168.100.11:30500
#   cat > /etc/containerd/certs.d/192.168.100.11:30500/hosts.toml << EOF
#   server = "https://192.168.100.11:30500"
#   [host."https://192.168.100.11:30500"]
#     capabilities = ["pull", "resolve", "push"]
#     skip_verify = true
#   EOF
#   systemctl restart containerd
# =============================================================================

---
# PVC — persistent image storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "claude-agents.fullname" . }}-registry
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "claude-agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: registry
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.registry.storage.size }}
  {{- if .Values.registry.storage.storageClass }}
  storageClassName: {{ .Values.registry.storage.storageClass }}
  {{- end }}

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "claude-agents.fullname" . }}-registry
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "claude-agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: registry
    app.kubernetes.io/name: container-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: container-registry
      app.kubernetes.io/instance: {{ .Release.Name }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "claude-agents.labels" . | nindent 8 }}
        app.kubernetes.io/name: container-registry
        app.kubernetes.io/component: registry
    spec:
      containers:
        - name: registry
          image: docker.io/library/registry:{{ .Values.registry.image.tag }}
          imagePullPolicy: {{ .Values.registry.image.pullPolicy }}
          ports:
            - name: registry
              containerPort: 5000
              protocol: TCP
          env:
            - name: REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY
              value: /var/lib/registry
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
            - name: REGISTRY_LOG_LEVEL
              value: {{ .Values.registry.logLevel | quote }}
            - name: REGISTRY_HTTP_ADDR
              value: "0.0.0.0:5000"
            {{- if .Values.registry.tls.enabled }}
            - name: REGISTRY_HTTP_TLS_CERTIFICATE
              value: /certs/tls.crt
            - name: REGISTRY_HTTP_TLS_KEY
              value: /certs/tls.key
            {{- end }}
          volumeMounts:
            - name: registry-data
              mountPath: /var/lib/registry
            {{- if .Values.registry.tls.enabled }}
            - name: registry-tls
              mountPath: /certs
              readOnly: true
            {{- end }}
          livenessProbe:
            tcpSocket:
              port: registry
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: registry
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: {{ .Values.registry.resources.requests.cpu }}
              memory: {{ .Values.registry.resources.requests.memory }}
            limits:
              cpu: {{ .Values.registry.resources.limits.cpu }}
              memory: {{ .Values.registry.resources.limits.memory }}
      volumes:
        - name: registry-data
          persistentVolumeClaim:
            claimName: {{ include "claude-agents.fullname" . }}-registry
        {{- if .Values.registry.tls.enabled }}
        - name: registry-tls
          secret:
            secretName: {{ .Values.registry.tls.secretName }}
        {{- end }}

---
# Service — NodePort for both internal pulls and external pushes
# No ingress needed — HTTP NodePort bypasses all TLS complexity
apiVersion: v1
kind: Service
metadata:
  name: {{ include "claude-agents.fullname" . }}-registry
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "claude-agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: registry
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: container-registry
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: registry
      port: 5000
      targetPort: registry
      nodePort: {{ .Values.registry.nodePort }}
      protocol: TCP
{{- end }}
