{{- if .Values.rbac.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.rbac.serviceAccountName }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "claude-agents.labels" . | nindent 4 }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "claude-agents.fullname" . }}-agent-role
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "claude-agents.labels" . | nindent 4 }}
rules:
  # Create Jobs on demand (dispatcher spawns agent jobs from cronjob templates)
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Read CronJobs (used as templates by the dispatcher via --from cronjob/)
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch"]
  # Read ConfigMaps (agent instructions and project context)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  # Read pod info and logs
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "claude-agents.fullname" . }}-agent-rolebinding
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "claude-agents.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.rbac.serviceAccountName }}
    namespace: {{ .Values.global.namespace }}
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: {{ include "claude-agents.fullname" . }}-agent-role
{{- end }}
